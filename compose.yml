version: "3.9"

services:
  frontend:
    image: node:22-alpine
    container_name: windor-frontend

    working_dir: /usr/src/app

    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules

    command: >
      sh -c "
      npm install &&
      npm run build &&
      npm run start
      "

    ports:
      - "3001:3000"

    environment:
      NODE_ENV: production
      PORT: 3000

      NEXT_PUBLIC_BASE_URL: http://13.59.207.17:3000
      NEXT_PUBLIC_AWS_IMAGE_BASE_URL: https://caz-windor-verifications-images.s3.us-east-2.amazonaws.com

    restart: unless-stopped